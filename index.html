<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Profiling of Global Disability Causes — an interactive look at the prevalence of causes of disability across WHO regions, based on the WHO Disability Prevalence Dataset."
    />
    <title>Profiling of Global Disability Causes</title>

    <!-- Social share preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Profiling of Global Disability Causes" />
    <meta
      property="og:description"
      content="An interactive look at the prevalence of causes of disability across WHO regions, based on the WHO Disability Prevalence Dataset."
    />
    <meta property="og:image" content="/og-cover.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Profiling of Global Disability Causes" />
    <meta
      name="twitter:description"
      content="An interactive look at the prevalence of causes of disability across WHO regions."
    />
    <meta name="twitter:image" content="/og-cover.png" />

    <script>
      // Set the theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
